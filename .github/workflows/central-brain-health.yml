# Optional: ping Central Brain health endpoint (set CENTRAL_BRAIN_HEALTH_URL repo secret).
name: Central Brain health

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        if: ${{ secrets.CENTRAL_BRAIN_HEALTH_URL != '' }}
        run: |
          url="${{ secrets.CENTRAL_BRAIN_HEALTH_URL }}"
          code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$url/health")
          echo "HTTP $code"
          cat /tmp/health.json
          test "$code" = "200"
