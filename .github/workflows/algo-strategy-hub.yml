# Multi-horizon algo selection — ranked picks per intraday / weekly / monthly / long-term.
# Manual: Actions → Algo Strategy Hub → Run workflow

name: Algo Strategy Hub

on:
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe (e.g. Nifty 50 (fast))"
        required: false
        default: "Nifty 50 (fast)"
      market:
        description: "NSE or US"
        required: false
        default: "NSE"
      top_n:
        description: "Top picks per horizon"
        required: false
        default: "5"
  schedule:
    # 04:30 UTC ≈ 10:00 IST — post-open intraday + swing context
    - cron: "30 4 * * 1-5"
    # 10:00 UTC ≈ 15:30 IST — before NSE close
    - cron: "0 10 * * 1-5"

jobs:
  algo-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run algo hub scan
        run: |
          python scripts/run_algo_hub.py \
            --universe "${{ github.event.inputs.universe || 'Nifty 50 (fast)' }}" \
            --market "${{ github.event.inputs.market || 'NSE' }}" \
            --top-n "${{ github.event.inputs.top_n || '5' }}" \
            --max-intraday 50 \
            --data-source yahoo \
            --horizons intraday,weekly,monthly,long_term

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: algo-hub-${{ github.run_id }}
          path: output/algo_hub/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          echo "## Algo Strategy Hub" >> "$GITHUB_STEP_SUMMARY"
          if ls output/algo_hub/summary_*.json 1>/dev/null 2>&1; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat output/algo_hub/summary_*.json | tail -1 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
